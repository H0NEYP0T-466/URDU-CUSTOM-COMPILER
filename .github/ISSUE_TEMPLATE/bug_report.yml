name: Bug report
description: Report a reproducible problem
labels: ["bug"]
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of what the bug is.
      placeholder: "When I run X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Enter code '...'
        3. Click Run
        4. See error
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g. Windows 11, macOS 14, Ubuntu 22.04
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      description: e.g. 3.12.1
    validations:
      required: false

  - type: input
    id: node_version
    attributes:
      label: Node Version
      description: e.g. 20.11.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Output
      description: Paste any relevant log output or error messages.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low — cosmetic or minor issue
        - Medium — affects functionality but has a workaround
        - High — breaks core functionality
        - Critical — crashes or data loss
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem.
